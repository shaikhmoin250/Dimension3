<h2>Your Cart</h2>
<div *ngFor="let item of (items$ | async); let i=index; trackBy: trackById">
  {{ item.product.name }} x
  <input type="number" [ngModel]="item.qty" (ngModelChange)="update(item.product.id, $event)" min="1" />
  <button (click)="remove(i)">Remove</button>
</div>
<p>Total: {{ (total$ | async) | currency }}</p>
<button routerLink="/checkout" [disabled]="!(items$ | async)?.length">Checkout</button>
