<h2>Your Cart</h2>
<div *ngFor="let item of cart.items; let i=index">
  {{ item.name }} x
  <input type="number" [(ngModel)]="item.qty" min="1" />
  <button (click)="cart.remove(i)">Remove</button>
</div>
<p>Total: {{ cart.total() | currency }}</p>
<button routerLink="/checkout" [disabled]="!cart.items.length">Checkout</button>
