<h2>{{ 'yourCart' | translate }}</h2>
<div *ngFor="let item of (items$ | async); let i=index; trackBy: trackById">
  {{ item.product.name }} x
  <input type="number" [ngModel]="item.qty" (ngModelChange)="update(item.product.id, $event)" min="1" />
  <button (click)="remove(i)">{{ 'remove' | translate }}</button>
</div>
<p>{{ 'total' | translate }} {{ (total$ | async) | currency }}</p>
<button routerLink="/checkout" [disabled]="!(items$ | async)?.length">{{ 'checkout' | translate }}</button>
