<h2>Products</h2>
<app-search-bar (search)="onSearch($event)"></app-search-bar>

<label>
  Category:
  <select [(ngModel)]="category" (change)="applyFilters()">
    <option value="">All</option>
    <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
  </select>
</label>

<label>
  Sort:
  <select [(ngModel)]="sort" (change)="applyFilters()">
    <option [ngValue]="''">Default</option>
    <option [ngValue]="SortOption.PriceAsc">Price Low - High</option>
    <option [ngValue]="SortOption.PriceDesc">Price High - Low</option>
    <option [ngValue]="SortOption.Rating">Rating</option>
  </select>
</label>

<div *ngFor="let p of (products$ | async); trackBy: trackById">
  <a [routerLink]="['/products', p.id]">{{ p.name }} - {{ p.price | currency }}</a>
  <button (click)="addToCart(p)">Add to Cart</button>
</div>
