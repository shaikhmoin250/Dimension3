<h2>Register</h2>
<form (ngSubmit)="register()" #f="ngForm">
  <input name="username" [(ngModel)]="username" required placeholder="Username" />
  <input type="password" name="password" [(ngModel)]="password" required placeholder="Password" />
  <button type="submit" [disabled]="!f.valid">Register</button>
</form>
